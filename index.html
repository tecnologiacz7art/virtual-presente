<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presente para o meu amor ❤️</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #ffe6e6;
        text-align: center;
        margin: 0;
        padding: 20px;
    }

    h1 {
        color: #ff4d4d;
        margin: 0 auto;
    }

    .container {
        max-width: 300px;
        margin: 0 auto;
        background-color: #fff0f0;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .carousel-container {
        overflow: hidden;
        width: 100%;
        margin: 20px 0;
    }

    .carousel-track {
        display: flex;
        transition: transform 0.5s ease-in-out;
        width: 100%;
        height: 400px;
        margin: 0;
        padding: 0;
        list-style: none;
        margin: 0;
        padding: 0;
    }

    .carousel-slide {
        min-width: 100%;
        height: 400px;
        object-fit: cover;
        margin: 0;
        padding: 0;
    }

    
    .heart {
        position: fixed;
        bottom: 0;
        animation: subir 4s linear forwards;
    }

    @keyframes subir {
        from {
            transform: translateY(0); opacity: 1; 
        }
        to {
            transform: translateY(-100vh); opacity: 0;
        }
    }


    </style>
</head>

<body>

    <h1>Para você, meu amor!❤️</h1>

    <div class="container">

        <!-- Música -->
        <audio controls autoplay loop>
            <source src="../virtual-presente/Luan Santana - Te Vivo (Clipe Oficial) [dWpGsK8Md28].mp3">
        </audio>
        <!-- Carrossel de Fotos -->
        <div class="carousel-container">
            <div class="carousel-track">
                <img class="carousel-slide" src="../virtual-presente/WhatsApp Image 2026-03-15 at 21.38.32.jpeg" alt="Nós dois" width="400" height="400">
                <img class="carousel-slide" src="../virtual-presente/WhatsApp Image 2026-03-15 at 21.38.32 (1).jpeg" alt="Nós dois" width="80" height="80">
                <img class="carousel-slide" src="../virtual-presente/WhatsApp Image 2026-03-15 at 21.38.31.jpeg" alt="Nós dois" width="80" height="80">
                <img class="carousel-slide" src="../virtual-presente/WhatsApp Image 2026-03-15 at 21.38.32 (2).jpeg" alt="Nós dois" width="80" height="80">
            </div>
        </div>

        <!-- Contador -->
        <div class="contador">
            <h2>Eu te amo há:</h2>
            <div id="contador"></div>
        </div>

        <!-- Corações -->
        <div class="hearts"></div>

        <!--Mensagem-->
        <div class="mensagem">
            <p>Só pra deixar claro o tanto que te amo!❤️‍🔥</p>
        </div>

    </div>

    <script>
        const track = document.querySelector(".carousel-track");
        const slides = Array.from(track.children);
        let currentIndex = 0;

        function moverCarrossel() {
            currentIndex = (currentIndex + 1) % slides.length;
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
        }

        setInterval(moverCarrossel, 3000);
        //coração subindo//

        function criarCoracao() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️‍🔥";
            heart.style.left = Math.random() * 100 + "vw";
            heart.stylefontSize = Math.random() * 20 + 10 + "px";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }
        
        setInterval(criarCoracao, 300);

       //contador //
       function atualizarContador() {
  const inicio = new Date(2025, 4, 9, 0, 0, 0); // 9 de maio de 2025
  const agora = new Date();

  let anos = agora.getFullYear() - inicio.getFullYear();
  let meses = agora.getMonth() - inicio.getMonth();
  let dias = agora.getDate() - inicio.getDate();

  if (dias < 0) {
    meses--;
    const ultimoMes = new Date(agora.getFullYear(), agora.getMonth(), 0);
    dias += ultimoMes.getDate();
  }

  if (meses < 0) {
    anos--;
    meses += 12;
  }

  const diff = agora - inicio;

  const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutos = Math.floor((diff / (1000 * 60)) % 60);
  const segundos = Math.floor((diff / 1000) % 60);

  document.getElementById("contador").innerHTML =
    anos + " anos, " +
    meses + " meses, " +
    dias + " dias, " +
    horas + " horas, " +
    minutos + " minutos e " +
    segundos + " segundos";
}

setInterval(atualizarContador, 1000);
    </script>
</body>
</html>
